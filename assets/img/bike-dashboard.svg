<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1200" height="675" fill="#0e1219"/>
  <!-- Header -->
  <text x="48" y="62" fill="#e8ecf4" font-size="28" font-weight="700">Bike Sales — Profitability &amp; Data-Quality Audit</text>
  <text x="48" y="92" fill="#6b7689" font-size="15">113,000 rows · 100% Excel, fully formula-driven · illustrative preview</text>
  <rect x="950" y="40" width="202" height="36" rx="8" fill="#141925" stroke="#232a3a"/>
  <text x="968" y="63" fill="#9aa5b8" font-size="14">Slicers: Country ▾ · Year ▾</text>

  <!-- KPI cards -->
  <g>
    <rect x="48" y="120" width="258" height="100" rx="12" fill="#141925" stroke="#232a3a"/>
    <text x="68" y="152" fill="#6b7689" font-size="13">ROWS AUDITED</text>
    <text x="68" y="194" fill="#e8ecf4" font-size="32" font-weight="700">113,000</text>

    <rect x="330" y="120" width="258" height="100" rx="12" fill="#141925" stroke="#232a3a"/>
    <text x="350" y="152" fill="#6b7689" font-size="13">FABRICATED ROWS FLAGGED</text>
    <text x="350" y="194" fill="#f59e0b" font-size="32" font-weight="700">~50%</text>

    <rect x="612" y="120" width="258" height="100" rx="12" fill="#141925" stroke="#232a3a"/>
    <text x="632" y="152" fill="#6b7689" font-size="13">MARGIN AT FULL PRICE</text>
    <text x="632" y="194" fill="#2dd4bf" font-size="32" font-weight="700">51%</text>

    <rect x="894" y="120" width="258" height="100" rx="12" fill="#141925" stroke="#232a3a"/>
    <text x="914" y="152" fill="#6b7689" font-size="13">MARGIN AT DEEP DISCOUNT</text>
    <text x="914" y="194" fill="#f59e0b" font-size="32" font-weight="700">31%</text>
  </g>

  <!-- Margin erosion by discount band -->
  <rect x="48" y="248" width="640" height="380" rx="12" fill="#141925" stroke="#232a3a"/>
  <text x="72" y="284" fill="#e8ecf4" font-size="16" font-weight="600">Margin Erosion by Discount Band (verified data only)</text>
  <g>
    <rect x="110" y="350" width="80" height="250" fill="#2dd4bf"/>
    <rect x="230" y="385" width="80" height="215" fill="#2dd4bf" opacity="0.8"/>
    <rect x="350" y="430" width="80" height="170" fill="#2dd4bf" opacity="0.6"/>
    <rect x="470" y="475" width="80" height="125" fill="#f59e0b" opacity="0.8"/>
    <text x="128" y="338" fill="#2dd4bf" font-size="15" font-weight="700">51%</text>
    <text x="248" y="373" fill="#2dd4bf" font-size="15" font-weight="700">45%</text>
    <text x="368" y="418" fill="#9aa5b8" font-size="15" font-weight="700">38%</text>
    <text x="488" y="463" fill="#f59e0b" font-size="15" font-weight="700">31%</text>
    <line x1="90" y1="600" x2="640" y2="600" stroke="#232a3a" stroke-width="2"/>
    <text x="110" y="622" fill="#6b7689" font-size="12">Full price</text>
    <text x="230" y="622" fill="#6b7689" font-size="12">Light disc.</text>
    <text x="350" y="622" fill="#6b7689" font-size="12">Medium disc.</text>
    <text x="470" y="622" fill="#6b7689" font-size="12">Deep disc.</text>
  </g>

  <!-- Margin by product line -->
  <rect x="712" y="248" width="440" height="380" rx="12" fill="#141925" stroke="#232a3a"/>
  <text x="736" y="284" fill="#e8ecf4" font-size="16" font-weight="600">Margin by Product Line</text>
  <g font-size="13">
    <text x="736" y="340" fill="#9aa5b8">Helmets</text>
    <rect x="850" y="326" width="265" height="22" rx="4" fill="#2dd4bf"/>
    <text x="1085" y="342" fill="#04211c" font-size="13" font-weight="700">59%</text>
    <text x="736" y="392" fill="#9aa5b8">Accessories</text>
    <rect x="850" y="378" width="230" height="22" rx="4" fill="#2dd4bf" opacity="0.8"/>
    <text x="736" y="444" fill="#9aa5b8">Apparel</text>
    <rect x="850" y="430" width="200" height="22" rx="4" fill="#2dd4bf" opacity="0.6"/>
    <text x="736" y="496" fill="#9aa5b8">Bikes</text>
    <rect x="850" y="482" width="160" height="22" rx="4" fill="#2dd4bf" opacity="0.45"/>
  </g>
  <text x="736" y="560" fill="#6b7689" font-size="13">Helmets out-earn bikes on margin —</text>
  <text x="736" y="582" fill="#6b7689" font-size="13">high-volume, low-ticket accessories drive profit</text>
</svg>
